<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" role="img" aria-labelledby="title">
  <title id="title">Four-tier ingest pipeline: edge to gateway to pipeline to warehouse.</title>
  <style>
    .tier{fill:#fff;stroke:#AEBBCC;stroke-width:1}.tail{fill:rgba(0,124,158,.1);stroke:#007C9E;stroke-width:1.25}.num{fill:#007C9E;font-size:9px;letter-spacing:.15em}.label{fill:#0B1220;font-size:13px}.arrow{fill:#AEBBCC}
  </style>
  <rect x="20" y="40" width="100" height="60" rx="4" class="tier"/><text x="70" y="62" text-anchor="middle" class="num">T1</text><text x="70" y="82" text-anchor="middle" class="label">edge</text><polygon points="122,65 133,70 122,75" class="arrow"/>
  <rect x="135" y="40" width="100" height="60" rx="4" class="tier"/><text x="185" y="62" text-anchor="middle" class="num">T2</text><text x="185" y="82" text-anchor="middle" class="label">gateway</text><polygon points="237,65 248,70 237,75" class="arrow"/>
  <rect x="250" y="40" width="100" height="60" rx="4" class="tier"/><text x="300" y="62" text-anchor="middle" class="num">T3</text><text x="300" y="82" text-anchor="middle" class="label">pipeline</text><polygon points="352,65 363,70 352,75" class="arrow"/>
  <rect x="365" y="40" width="100" height="60" rx="4" class="tail"/><text x="415" y="62" text-anchor="middle" class="num">T4</text><text x="415" y="82" text-anchor="middle" class="label">warehouse</text>
</svg>
