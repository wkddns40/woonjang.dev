<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 564 130" role="img" aria-labelledby="title">
  <title id="title">untamedai five-stage operation pipeline: plan, design, build, deploy, operate.</title>
  <style>
    .step{fill:#fff;stroke:#AEBBCC;stroke-width:1}.active{fill:rgba(0,124,158,.1);stroke:#007C9E;stroke-width:1.25}.num{fill:#526173;font-size:10px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.15em}.num-active{fill:#007C9E;font-size:10px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.15em}.label{fill:#0B1220;font-size:14px}.memo{fill:#526173;font-size:10px}.rail{stroke:#D8E1EA;stroke-width:1;stroke-dasharray:2 4}.arrow{fill:#AEBBCC}
  </style>
  <line x1="102" y1="50" x2="114" y2="50" class="rail"/><polygon points="104,45 112,50 104,55" class="arrow"/>
  <line x1="218" y1="50" x2="230" y2="50" class="rail"/><polygon points="220,45 228,50 220,55" class="arrow"/>
  <line x1="334" y1="50" x2="346" y2="50" class="rail"/><polygon points="336,45 344,50 336,55" class="arrow"/>
  <line x1="450" y1="50" x2="462" y2="50" class="rail"/><polygon points="452,45 460,50 452,55" class="arrow"/>
  <g><rect x="0" y="20" width="100" height="60" rx="4" class="step"/><text x="50" y="40" text-anchor="middle" class="num">01</text><text x="50" y="60" text-anchor="middle" class="label">&#44592;&#54925;</text><text x="50" y="102" text-anchor="middle" class="memo">plan</text></g>
  <g><rect x="116" y="20" width="100" height="60" rx="4" class="step"/><text x="166" y="40" text-anchor="middle" class="num">02</text><text x="166" y="60" text-anchor="middle" class="label">&#49444;&#44228;</text><text x="166" y="102" text-anchor="middle" class="memo">design</text></g>
  <g><rect x="232" y="20" width="100" height="60" rx="4" class="step"/><text x="282" y="40" text-anchor="middle" class="num">03</text><text x="282" y="60" text-anchor="middle" class="label">&#44060;&#48156;</text><text x="282" y="102" text-anchor="middle" class="memo">build</text></g>
  <g><rect x="348" y="20" width="100" height="60" rx="4" class="step"/><text x="398" y="40" text-anchor="middle" class="num">04</text><text x="398" y="60" text-anchor="middle" class="label">&#48176;&#54252;</text><text x="398" y="102" text-anchor="middle" class="memo">deploy</text></g>
  <g><rect x="464" y="20" width="100" height="60" rx="4" class="active"/><text x="514" y="40" text-anchor="middle" class="num-active">05</text><text x="514" y="60" text-anchor="middle" class="label">&#50868;&#50689;</text><text x="514" y="102" text-anchor="middle" class="memo">operate</text></g>
</svg>
